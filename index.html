<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>じぶんじてん</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
  /* すべての色・形はトークン（css/tokens.css）を参照。ハードコード色を書かない */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: var(--font-ui);
    background: var(--paper);
    color: var(--ink-soft);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  .screen { display: none; min-height: 100%; padding: var(--space); max-width: 640px; margin: 0 auto; }
  .screen.on { display: flex; flex-direction: column; align-items: center; }
  button { font-family: inherit; cursor: pointer; touch-action: manipulation; }

  /* ---- ホーム（home-mock.html 準拠） ---- */
  #scrHome { max-width: 420px; padding: 0; }
  #scrHome.on { display: block; }
  .hTop { padding: 22px 24px 6px; display: flex; align-items: baseline; justify-content: space-between; }
  .wordmark { font-size: 15px; font-weight: 600; letter-spacing: 0.06em; color: var(--ink-soft); }
  .wordmark .dot { color: var(--grow); }
  .hDate { font-size: 12px; color: var(--ghost); letter-spacing: 0.04em; font-family: var(--font-num); }
  .wallLabel {
    padding: 14px 24px 10px; font-size: 12.5px; color: var(--ink-soft);
    letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px;
  }
  .wallLabel .count { color: var(--grow); font-weight: 600; font-family: var(--font-num); }
  .wall { padding: 2px 18px 8px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; }
  .wall .cell {
    aspect-ratio: 1; border-radius: 9px; position: relative; padding: 3px;
    display: flex; align-items: center; justify-content: center;
  }
  .wall .cell svg { width: 100%; height: 100%; display: block; }
  .wall .cell.done { background: #fff; border: 1px solid var(--paper-edge); box-shadow: 0 1px 0 rgba(27,42,74,0.04); }
  .wall .cell.fresh { background: #fff; border: 1px solid var(--grow); }
  .wall .cell.fresh::after {
    content: ''; position: absolute; top: 5px; right: 5px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--grow);
  }
  .wall .cell.todo { background: transparent; border: 1px dashed var(--ghost-faint); }
  .todayCard {
    display: flex; align-items: center; justify-content: space-between;
    width: calc(100% - 40px); margin: 16px 20px 8px;
    background: var(--ink); border: none; border-radius: 16px;
    padding: 20px 22px; color: #fff; text-align: left;
    position: relative; overflow: hidden;
  }
  .todayCard::before {  /* 紙にインクがにじむ気配（新緑） */
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(120% 140% at 85% -20%, rgba(58,157,107,0.22), transparent 55%);
    pointer-events: none;
  }
  .todayCard:active { opacity: 0.92; }
  .todayCard .lead { position: relative; display: flex; flex-direction: column; }
  .todayCard .k { font-size: 12px; letter-spacing: 0.1em; color: #9FB0CF; margin-bottom: 6px; }
  .todayCard .t { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; }
  .todayCard .go {
    position: relative; width: 46px; height: 46px; border-radius: 50%;
    background: var(--grow); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .todayCard .go svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2.4; fill: none; }
  .hProgress { margin: 6px 24px 2px; }
  .hProgress .bar { height: 7px; border-radius: 4px; background: var(--ghost-faint); overflow: hidden; }
  .hProgress .fill { height: 100%; width: 0%; background: var(--grow); border-radius: 4px; transition: width 300ms ease-out; }
  .hProgress .meta {
    display: flex; justify-content: space-between;
    margin-top: 7px; font-size: 11.5px; color: var(--ghost); letter-spacing: 0.03em;
  }
  .hProgress .meta b { color: var(--ink-soft); font-weight: 600; }
  #homeBest { font-size: 11px; color: var(--ghost); font-family: var(--font-num); margin-top: 4px; text-align: right; }
  .hRow { margin: 16px 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile {
    background: #fff; border: 1px solid var(--paper-edge); border-radius: 14px;
    padding: 16px 16px 15px; text-align: left;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 104px; justify-content: space-between;
  }
  .tile:active { background: var(--paper-edge); }
  .tile .ic { width: 30px; height: 30px; color: var(--ink-soft); }
  .tile .ic svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 1.7; fill: none; }
  .tile .nm { display: block; font-size: 15px; font-weight: 600; color: var(--ink); }
  .tile .sub { display: block; font-size: 11.5px; color: var(--ghost); margin-top: 2px; }
  .tile.exam .badge {
    align-self: flex-start; font-size: 10.5px; letter-spacing: 0.06em;
    background: var(--grow-bg); color: var(--grow);
    padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .footnote { text-align: center; font-size: 10.5px; color: var(--ghost-faint); padding: 0 0 14px; letter-spacing: 0.04em; }
  #backupBox { margin: 0 20px 8px; width: auto; font-size: 12px; color: var(--ghost); }
  #backupBox summary { cursor: pointer; }
  #backupBox .inner { padding: 10px 4px; line-height: 1.7; color: var(--ink-soft); }
  #backupBox button { font-size: 12px; padding: 6px 12px; border: 1px solid var(--ghost); border-radius: 8px; background: #fff; color: var(--ink-soft); margin-right: 8px; }
  .ver { margin: 0 0 16px; text-align: center; font-size: 11px; color: var(--ghost); }

  /* ---- 学年をえらぶ（R1新設・モック未合意画面＝情報設計の範囲で素直に組む） ----
     外の器（積み木）: 温かいオフホワイト＋色ブロック＋右下3px段差（パターンC） */
  #scrGradeSelect {
    max-width: none;
    min-height: 100dvh;
    background: var(--block-bg);
    color: var(--block-text);
    justify-content: center;
    gap: 16px;
    padding: 28px 24px;
  }
  #gsTitle { font-size: 25px; font-weight: 800; letter-spacing: 0.02em; }
  #gsSub { font-size: 13.5px; color: var(--block-muted); }
  #gsGrid {
    display: grid;
    grid-template-columns: repeat(6, minmax(84px, 116px));
    gap: 14px;
    margin: 12px 0 6px;
  }
  @media (max-width: 740px) {
    #gsGrid { grid-template-columns: repeat(3, 1fr); width: 100%; max-width: 400px; }
  }
  #gsGrid button {
    aspect-ratio: 1;
    border-radius: var(--block-radius);
    border: 2px dashed var(--block-dash);
    background: #fff;
    color: var(--block-muted);
    font-size: 15px;
    font-weight: 800;
    font-family: var(--font-ui);
    box-shadow: 3px 3px 0 var(--block-dash-edge);
  }
  #gsGrid button .num {
    display: block;
    font-family: var(--font-num);
    font-size: 32px;
    line-height: 1.1;
    margin-bottom: 3px;
  }
  #gsGrid button.sel {
    background: var(--block-hero);
    border: 2px solid var(--block-hero);
    color: #fff;
    box-shadow: 3px 3px 0 var(--block-hero-edge), 5px 6px 12px rgba(51,50,46,.10);
  }
  #gsConfirm {
    font-size: 17px;
    font-weight: 800;
    font-family: var(--font-ui);
    padding: 15px 44px;
    border: none;
    border-radius: var(--block-radius);
    background: var(--block-text);
    color: #fff;
    box-shadow: 3px 3px 0 var(--block-text-edge), 5px 6px 12px rgba(51,50,46,.10);
  }
  #gsConfirm:disabled { opacity: 0.35; box-shadow: none; }

  /* ---- れんしゅう ---- */
  #pTop { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; }
  #pCounter { font-size: 13px; color: var(--ghost); }
  #pQuit { font-size: 13px; padding: 6px 14px; border: 1px solid var(--ghost); border-radius: 10px; background: #fff; color: var(--ink-soft); }
  #pQuit:active { background: var(--paper-edge); }
  #pReadings { min-height: 44px; margin: 6px 0 2px; text-align: center; line-height: 1.5; }
  #pReadings .kun { font-size: 21px; color: var(--ink); font-weight: 600; }
  #pReadings .on { font-size: 13px; color: var(--ghost); letter-spacing: 1px; }
  #pMsg { min-height: 30px; font-size: 17px; font-weight: 600; margin: 4px 0; text-align: center; }
  #pMsg.good { color: var(--grow); }
  #pMsg.accent { color: var(--ink-soft); }
  #pCell {
    width: min(88vw, 440px, calc(100dvh - 320px));
    aspect-ratio: 1;
    background: #fff;
    border: 1px solid var(--paper-edge);
    border-radius: var(--radius);
    box-shadow: var(--shadow-cell);
    touch-action: none;
    display: block;
  }
  #pDots { display: flex; gap: 8px; margin: 10px 0 4px; min-height: 14px; }
  #pDots span { width: 10px; height: 10px; border-radius: 50%; background: var(--ghost-faint); }
  #pDots span.done { background: var(--grow); }
  #pBtns { margin-top: 8px; display: flex; gap: 12px; }
  #pAction {
    font-size: 19px; padding: 14px 36px; border: none; border-radius: var(--radius-lg);
    background: var(--ink); color: #fff; box-shadow: var(--shadow-card);
  }
  #pAction:active { opacity: 0.88; }
  #pAction[hidden] { display: none; }

  /* ---- テスト（測る場の静けさ） ---- */
  #eTop { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; }
  #eCounter { font-size: 13px; color: var(--ghost); font-family: var(--font-num); }
  #eQuit { font-size: 13px; padding: 6px 14px; border: 1px solid var(--ghost); border-radius: 10px; background: #fff; color: var(--ink-soft); }
  #eQuit:active { background: var(--paper-edge); }
  #ePrompt { font-size: 15px; font-weight: 600; color: var(--ink-soft); margin: 12px 0 6px; text-align: center; }
  #eSentence { font-size: 22px; line-height: 1.9; margin: 6px 0 10px; text-align: center; max-width: 480px; color: var(--ink); }
  #eSentence .target {
    color: var(--ink); font-weight: 600;
    border-bottom: 3px solid var(--grow); padding-bottom: 1px;
  }
  #eSentence .kblank {
    display: inline-block; min-width: 1.7em; text-align: center;
    border: 2px dashed var(--ink-soft); border-radius: 8px; color: var(--ink-soft);
    font-size: 15px; padding: 2px 5px; margin: 0 2px; vertical-align: baseline; background: #fff;
  }
  #eCharBox {
    width: min(50vw, 200px); aspect-ratio: 1; background: #fff;
    border: 1px solid var(--paper-edge); border-radius: var(--radius);
    box-shadow: var(--shadow-cell); margin: 6px 0 10px;
  }
  #eCharBox svg { width: 100%; height: 100%; display: block; }
  #eChoices { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 400px; }
  #eChoices button {
    font-size: 22px; padding: 16px; border: 1px solid var(--paper-edge); border-radius: var(--radius);
    background: #fff; color: var(--ink); box-shadow: var(--shadow-cell);
  }
  #eChoices button:active { background: var(--paper-edge); }
  #eCell {
    width: min(80vw, 380px, calc(100dvh - 340px));
    aspect-ratio: 1; background: #fff; border: 1px solid var(--paper-edge);
    border-radius: var(--radius); box-shadow: var(--shadow-cell);
    touch-action: none; display: none;
  }
  #eKakiBtns { display: none; gap: 12px; margin-top: 10px; }
  #eKakiBtns button { font-size: 16px; padding: 12px 28px; border-radius: var(--radius); border: 1px solid var(--ghost); background: #fff; color: var(--ink-soft); }
  #eKakiBtns #eSubmit { background: var(--ink); color: #fff; border: none; }

  /* ---- けっか（点数は作品のように） ---- */
  #scrResult h2 { font-size: 16px; color: var(--ghost); margin: 30px 0 6px; letter-spacing: 4px; font-weight: 600; }
  #rScore { font-family: var(--font-num); font-size: 52px; font-weight: 600; color: var(--ink); margin: 2px 0 6px; }
  #rMsg { font-size: 18px; font-weight: 600; min-height: 28px; margin: 4px 0 2px; text-align: center; }
  #rMsg.good { color: var(--grow); }
  #rMsg.accent { color: var(--ink-soft); }
  #rBest { font-size: 13px; color: var(--ghost); font-family: var(--font-num); margin-bottom: 14px; }
  #rReviewLabel { font-size: 14px; color: var(--ink-soft); margin-top: 8px; }
  #rReviewNote { font-size: 12px; color: var(--ghost); margin-bottom: 8px; }
  #rReviewGrid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 420px; }
  #rReviewGrid svg { width: 100%; height: 100%; }

  /* ---- ふりかえり（なんでかな？）---- */
  #rReviewGrid .rv {
    display: flex; flex-direction: column; align-items: center;
    width: 64px; padding: 3px 3px 4px; cursor: pointer;
    background: #fff; border: 1px solid var(--paper-edge); border-radius: var(--radius);
    box-shadow: var(--shadow-cell);
  }
  #rReviewGrid .rv svg { width: 52px; height: 52px; }
  #rReviewGrid .rv .why { font-size: 10px; color: var(--ink-soft); margin-top: 2px; }
  #wDetail {
    display: none; position: fixed; inset: 0; background: rgba(27, 42, 74, 0.35);
    align-items: center; justify-content: center; padding: 14px; z-index: 6;
  }
  #wDetail.on { display: flex; }
  #wPanel {
    background: #fff; border: 1px solid var(--paper-edge); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card); padding: 18px;
    width: min(94vw, 430px); max-height: 92vh; overflow-y: auto;
    display: flex; flex-direction: column; align-items: center;
  }
  #wTitle { font-size: 17px; font-weight: 600; color: var(--ink-soft); margin-bottom: 2px; min-height: 24px; }
  #wTitle.good { color: var(--grow); }
  #wSub { font-size: 13px; color: var(--ghost); min-height: 20px; margin-bottom: 6px; }
  #wCell {
    width: min(80vw, 330px); aspect-ratio: 1; background: var(--paper);
    border: 1px solid var(--paper-edge); border-radius: var(--radius);
    touch-action: none; display: block;
  }
  #wLegend { font-size: 11px; color: var(--ghost); margin-top: 6px; }
  #wAnswer { font-size: 20px; color: var(--ink); margin: 14px 0; min-height: 28px; }
  #wBtns { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
  #wBtns button { font-size: 15px; padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--ghost); background: #fff; color: var(--ink-soft); }
  #wBtns #wRewrite, #wBtns #wSubmit { border: none; background: var(--ink); color: #fff; }

  /* ---- じぶんじてん（作品集。定着した字が一番美しく見える画面） ---- */
  #dTop { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  #dTop h2 { font-size: 19px; color: var(--ink); letter-spacing: 2px; font-weight: 600; }
  #dBack { font-size: 14px; padding: 8px 18px; border: 1px solid var(--ghost); border-radius: 10px; background: #fff; color: var(--ink-soft); }
  #dBack:active { background: var(--paper-edge); }
  #dCount { width: 100%; font-size: 13px; color: var(--ghost); font-family: var(--font-num); margin-bottom: 12px; }
  #dGrid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
    gap: 8px;
  }
  #dGrid .cellBtn {
    position: relative;
    aspect-ratio: 1; padding: 4px;
    background: #fff; border: 1px solid var(--paper-edge); border-radius: var(--radius);
    box-shadow: var(--shadow-cell);
  }
  #dGrid .cellBtn.got { border-color: var(--ghost-faint); }
  #dGrid .cellBtn.today::after {
    /* 今日ぶん: ふちに新緑の点 */
    content: ''; position: absolute; right: 5px; bottom: 5px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--grow); box-shadow: 0 0 0 3px var(--grow-bg);
  }
  #dGrid svg { width: 100%; height: 100%; display: block; }
  #dSign {
    width: 100%; text-align: center; margin-top: 18px;
    font-size: 13px; color: var(--ink-soft); letter-spacing: 1px;
  }
  #dSign::before { content: '― '; color: var(--ghost); }
  #dSign::after { content: ' ―'; color: var(--ghost); }
  /* 詳細（額装） */
  #dDetail {
    display: none; position: fixed; inset: 0; background: rgba(27, 42, 74, 0.35);
    align-items: center; justify-content: center; padding: 14px; z-index: 5;
  }
  #dDetail.on { display: flex; }
  #dPanel {
    background: #fff; border: 1px solid var(--paper-edge); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card); padding: 18px;
    width: min(94vw, 560px); max-height: 92vh; overflow-y: auto;
  }
  #dPanel h3 { font-size: 21px; margin-bottom: 12px; color: var(--ink); }
  #dPanel h3 small { font-family: var(--font-num); font-size: 13px; color: var(--ghost); font-weight: 400; }
  #dThree { display: flex; gap: 12px; flex-wrap: wrap; }
  #dThree .slot { flex: 1 1 140px; text-align: center; }
  #dThree .slot .cap { font-size: 13px; color: var(--ink-soft); font-weight: 600; letter-spacing: 1px; }
  #dThree .slot .date { font-size: 11px; color: var(--ghost); font-family: var(--font-num); margin-bottom: 5px; }
  #dThree svg {
    width: 100%; aspect-ratio: 1;
    background: var(--paper);
    border: 1px solid var(--paper-edge); border-radius: var(--radius);
    box-shadow: inset 0 1px 2px rgba(27, 42, 74, 0.04);   /* 額装のわずかな奥行き */
  }
  #dThree .slot button {
    margin-top: 7px; font-size: 13px; padding: 6px 18px;
    border: 1px solid var(--ghost); color: var(--ink-soft); background: #fff; border-radius: 10px;
  }
  #dThree .slot button:active { background: var(--paper-edge); }
  #dNotYet { font-size: 14px; color: var(--ghost); padding: 10px 0 4px; }
  #dClose { margin-top: 16px; width: 100%; font-size: 16px; padding: 12px; border: none; border-radius: var(--radius); background: var(--paper-edge); color: var(--ink-soft); }
</style>
</head>
<body>

  <!-- ホーム（home-mock.html 準拠。壁が主役） -->
  <div id="scrHome" class="screen on">
    <div class="hTop">
      <div class="wordmark">じぶん字典<span class="dot">.</span></div>
      <div class="hDate" id="hDate"></div>
    </div>
    <div class="wallLabel">
      <span id="wallLabelText"></span>
      <span class="count" id="wallCount"></span>
    </div>
    <div class="wall" id="homeWall"></div>
    <button id="btnToday" class="todayCard" type="button">
      <span class="lead">
        <span class="k" id="todayK"></span>
        <span class="t" id="todayT"></span>
      </span>
      <span class="go" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </span>
    </button>
    <div class="hProgress">
      <div class="bar"><div class="fill" id="hFill"></div></div>
      <div class="meta">
        <span id="hLevel"></span>
        <span id="homeProgress"></span>
      </div>
      <div id="homeBest"></div>
    </div>
    <div class="hRow">
      <button id="btnExam" class="tile exam" type="button">
        <span class="badge" id="examBadge"></span>
        <span class="ic"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h5"/></svg></span>
        <span>
          <span class="nm" id="examNm"></span>
          <span class="sub" id="examSub"></span>
        </span>
      </button>
      <button id="btnDict" class="tile" type="button">
        <span class="ic"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="19" cy="18" r="2.4"/></svg></span>
        <span>
          <span class="nm" id="dictNm"></span>
          <span class="sub" id="dictSub"></span>
        </span>
      </button>
    </div>
    <div class="footnote" id="homeSign"></div>
    <details id="backupBox">
      <summary></summary>
      <div class="inner">
        <div id="backupNote"></div>
        <div style="margin-top:6px;">
          <button id="btnExport"></button>
          <button id="btnImport"></button>
          <input type="file" id="fileImport" accept="application/json" hidden>
        </div>
      </div>
    </details>
    <div class="ver">v0.10.1</div>
  </div>

  <!-- 学年をえらぶ（R1・初回に1度。あとで変更可） -->
  <div id="scrGradeSelect" class="screen">
    <div id="gsTitle"></div>
    <div id="gsSub"></div>
    <div id="gsGrid"></div>
    <button id="gsConfirm" type="button" disabled></button>
  </div>

  <!-- テスト -->
  <div id="scrExam" class="screen">
    <div id="eTop">
      <span id="eCounter"></span>
      <button id="eQuit"></button>
    </div>
    <div id="ePrompt"></div>
    <div id="eSentence"></div>
    <div id="eCharBox" hidden></div>
    <div id="eChoices"></div>
    <canvas id="eCell"></canvas>
    <div id="eKakiBtns">
      <button id="eRedo" type="button"></button>
      <button id="eSubmit" type="button"></button>
    </div>
  </div>

  <!-- けっか -->
  <div id="scrResult" class="screen">
    <h2 id="rTitle"></h2>
    <div id="rScore"></div>
    <div id="rMsg"></div>
    <div id="rBest"></div>
    <div id="rReviewLabel"></div>
    <div id="rReviewNote"></div>
    <div id="rReviewGrid"></div>
    <button id="rHome" class="bigBtn" style="margin-top:18px;"></button>
    <div id="wDetail">
      <div id="wPanel">
        <div id="wTitle"></div>

<script type="module">
// ?v= はデプロイごとに更新（実機ブラウザのモジュールキャッシュ滞留対策）
import { DEFAULT_CONFIG, scoreStroke, matchKanji, templateStrokes, samplePath, userStrokeTo109 } from './js/matcher.js?v=0.10.1';
import { openStore } from './js/store.js?v=0.10.1';
import { TEXTS, formatReadings } from './js/texts.js?v=0.10.1';
import { buildExam, scoreExam, EXAM_SPEC } from './js/exam.js?v=0.10.1';
import { SETTLE, wetColor, settleOverlay, settledSvg } from './js/settle.js?v=0.10.1';
import { GRADE_MIN, GRADE_MAX, loadSettings, saveSettings } from './js/settings.js?v=0.10.1';

const cfg = { ...DEFAULT_CONFIG }; // しきい値は暫定確定値（台帳）
const SVG_NS = 'http://www.w3.org/2000/svg';
const $ = id => document.getElementById(id);

// canvas 描画用のデザイントークン（css/tokens.css と同値。正本はデザイン言語）
const TK = {
  ink: '#1B2A4A', inkSoft: '#3A4B6E',
  ghost: '#C7CCD4', ghostFaint: '#DDE1E7',
  paperEdge: '#EDEFF3', grow: '#3A9D6B',
};

let kanjiList = [];
let byCharApp = {};      // {char: kanjiレコード}
let sentencesData = [];  // sentences-g1.json
let readingsData = {};   // exam-readings-g1.json
let store = null;
let entries = {};    // {char: {first,best,latest}} のキャッシュ
let settings = { grade: null, rubyEnabled: true };  // 学年設定（meta 'settings'）

// ---- 画面切替 ----
function show(id) {
  for (const s of document.querySelectorAll('.screen')) s.classList.remove('on');
  $(id).classList.add('on');
}

// ---- 静的文言の流し込み ----
function applyTexts() {
  $('todayK').textContent = TEXTS.home.todayK;
  $('todayT').textContent = TEXTS.home.todayT;
  $('wallLabelText').textContent = TEXTS.home.wallLabel;
  $('hLevel').textContent = TEXTS.home.level;
  $('examBadge').textContent = '10きゅう';
  $('examNm').textContent = TEXTS.home.examTile;
  $('examSub').textContent = TEXTS.home.examTileSub;
  $('dictNm').textContent = TEXTS.home.dict;
  $('dictSub').textContent = TEXTS.home.dictTileSub;
  const now = new Date();
  $('hDate').textContent = TEXTS.home.date(now.getMonth() + 1, now.getDate());
  $('eQuit').textContent = TEXTS.exam.quit;
  $('eRedo').textContent = TEXTS.exam.redo;
  $('eSubmit').textContent = TEXTS.exam.submit;
  $('rTitle').textContent = TEXTS.exam.resultTitle;
  $('rHome').textContent = TEXTS.exam.backHome;
  $('wRewrite').textContent = TEXTS.review.rewrite;
  $('wRedo').textContent = TEXTS.exam.redo;
  $('wSubmit').textContent = TEXTS.exam.submit;
  $('wClose').textContent = TEXTS.review.close;
  document.querySelector('#backupBox summary').textContent = TEXTS.backup.summary;
  $('backupNote').textContent = TEXTS.backup.note;
  $('btnExport').textContent = TEXTS.backup.export;
  $('btnImport').textContent = TEXTS.backup.import;
  $('pQuit').textContent = TEXTS.practice.quit;
  document.querySelector('#dTop h2').textContent = TEXTS.dict.title;
  $('dBack').textContent = TEXTS.dict.back;
  $('dClose').textContent = TEXTS.dict.close;
}

async function refreshHome() {
  entries = await store.getAll();
  const n = Object.keys(entries).length;
  // 進み帯・カウント
  $('hFill').style.width = (n / 80 * 100) + '%';
  $('homeProgress').innerHTML = `<b>${n}</b> こ おぼえた`;
  $('wallCount').textContent = TEXTS.home.wallCount(n);
  $('homeSign').textContent = n ? TEXTS.dict.signature(n) : '';
  // 壁: 習得済み（本人の定着筆跡）を先に、続きの未習得を ghost 破線で少し
  const wall = $('homeWall');
  wall.innerHTML = '';
  const doneRecs = kanjiList.filter(k => entries[k.char]);
  for (const rec of doneRecs) {
    const e = entries[rec.char];
    const d = document.createElement('div');
    d.className = 'cell ' + (sameDay(e.latest.at, Date.now()) ? 'fresh' : 'done');
    d.appendChild(settledSvg(e.best.strokes));
    wall.appendChild(d);
  }
  const todoRecs = kanjiList.filter(k => !entries[k.char]).slice(0, Math.max(6, 12 - (doneRecs.length % 6)));
  for (const rec of todoRecs) {
    const d = document.createElement('div');
    d.className = 'cell todo';
    d.appendChild(makeSvg(rec.strokes.map(s => s.path), TK.ghost, 4));
    wall.appendChild(d);
  }
  const [progress, best] = await Promise.all([
    store.metaGet('examProgress'), store.metaGet('examBest'),
  ]);
  $('examSub').textContent = progress ? TEXTS.home.examTileResume : TEXTS.home.examTileSub;
  $('homeBest').textContent = best ? TEXTS.exam.best(best.score) : '';
}

// ============================================================
// 学年をえらぶ（R1）
// ============================================================
// 誤タップで確定しない二段構え: ブロックを選ぶ →「これに きめる」で確定（§5-5）

let gsPick = null;

function renderGradeSelect() {
  $('gsTitle').textContent = TEXTS.settings.title;
  $('gsSub').textContent = TEXTS.settings.sub;
  $('gsConfirm').textContent = TEXTS.settings.confirm;
  const grid = $('gsGrid');
  grid.innerHTML = '';
  for (let g = GRADE_MIN; g <= GRADE_MAX; g++) {
    const b = document.createElement('button');
    b.type = 'button';
    b.innerHTML = `<span class="num">${g}</span>` + TEXTS.settings.gradeSuffix;
    b.addEventListener('click', () => {
      gsPick = g;
      for (const el of grid.children) el.classList.remove('sel');
      b.classList.add('sel');
      $('gsConfirm').disabled = false;
    });
    grid.appendChild(b);
  }
  gsPick = settings.grade;   // 変更で開いたときは現在値を選択済みに
  if (gsPick != null && grid.children[gsPick - 1]) {
    grid.children[gsPick - 1].classList.add('sel');
    $('gsConfirm').disabled = false;
  } else {
    $('gsConfirm').disabled = true;
  }
}

$('gsConfirm').addEventListener('click', async () => {
  if (gsPick == null) return;
  settings = await saveSettings(store, { ...settings, grade: gsPick });
  await refreshHome();
  show('scrHome');
});

// ============================================================
// れんしゅう
// ============================================================

const canvas = $('pCell');
const ctx = canvas.getContext('2d', { desynchronized: true });

const P = {
  chars: [], idx: 0,
  rec: null, tmpl: [], tmplPaths: [], anim: [],  // anim = 描画用サンプル列
  phase: 'watch',        // watch | trace | air | charDone | sessionDone
  accepted: [], scores: [], current: null,
  stumbles: 0, consecFails: 0, rescueGuide: false,
  timers: [], drawing: false,
};

function clearTimers() {
  for (const t of P.timers) clearTimeout(t);
  P.timers = [];
}

// きょうの5もじ: 復習キュー優先 → 未習得 → ベストスコアの低い順（もどってくる）
async function pickToday() {
  const queue = (await store.metaGet('reviewQueue')) || [];
  const qRecs = queue.map(c => byCharApp[c]).filter(Boolean);
  const rest = kanjiList.filter(k => !queue.includes(k.char));
  const un = rest.filter(k => !entries[k.char]);
  const got = rest.filter(k => entries[k.char])
    .sort((a, b) => entries[a.char].best.score - entries[b.char].best.score);
  return [...qRecs, ...un, ...got].slice(0, 5);
}

let cssSize = 0, rect = null, activePointer = null;

function resizeCell() {
  const dpr = window.devicePixelRatio || 1;
  cssSize = canvas.clientWidth;
  canvas.width = Math.round(cssSize * dpr);
  canvas.height = Math.round(cssSize * dpr);
  redrawCell();
}

function setSpace() {
  const dpr = window.devicePixelRatio || 1;
  const k = (cssSize * dpr) / 109;
  ctx.setTransform(k, 0, 0, k, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function drawCross() {
  ctx.save();
  ctx.strokeStyle = TK.paperEdge;
  ctx.lineWidth = 0.6;
  ctx.setLineDash([2.4, 1.8]);
  ctx.beginPath();
  ctx.moveTo(54.5, 0); ctx.lineTo(54.5, 109);
  ctx.moveTo(0, 54.5); ctx.lineTo(109, 54.5);
  ctx.stroke();
  ctx.restore();
}

function guideVisible() {
  return P.phase === 'trace' || P.phase === 'watch' || (P.phase === 'air' && P.rescueGuide);
}

function redrawCell() {
  if (!P.rec) return;
  setSpace();
  ctx.clearRect(0, 0, 109, 109);
  drawCross();
  if (guideVisible()) {
    ctx.strokeStyle = P.phase === 'watch' ? TK.ghostFaint : TK.ghost; // 手本ガイドは脇役
    ctx.lineWidth = 3.6;
    for (const p2d of P.tmplPaths) ctx.stroke(p2d);
  }
  if (P.settledFx) return; // 定着演出中はSVGオーバーレイが主役（canvas側の字は消す）
  // 書いている最中の線は生乾き（定着で ink に沈む）。watch の手本は ink
  ctx.strokeStyle = P.phase === 'watch' ? SETTLE.ink : wetColor(SETTLE);
  ctx.lineWidth = 2.8;
  for (const s of P.accepted) drawPoly(s, 1);
  if (P.current) drawPoly(P.current, 1);
}

function drawPoly(points, scaleTo109) {
  if (!points.length) return;
  const k = scaleTo109 ? 109 : 1;
  ctx.beginPath();
  ctx.moveTo(points[0].x * k, points[0].y * k);
  if (points.length === 1) ctx.lineTo(points[0].x * k + 0.01, points[0].y * k);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x * k, points[i].y * k);
  ctx.stroke();
}

// 1画をタイマー駆動で描き進める（rAF非依存・★台帳の教訓）
function animateStroke(i, color, stepMs, onDone) {
  const pts = P.anim[i];
  let k = 2;
  const step = () => {
    redrawCell();
    setSpace();
    ctx.strokeStyle = color;
    ctx.lineWidth = 3.4;
    drawPoly(pts.slice(0, k), 0);
    if (k < pts.length) {
      k += 2;
      P.timers.push(setTimeout(step, stepMs));
    } else if (onDone) onDone();
  };
  step();
}

// 手本アニメ: 全画を順に（watch用）
function animateAll(i = 0) {
  if (i >= P.anim.length) {
    P.accepted = P.rec.strokes.map((_, j) => P.anim[j].map(p => ({ x: p.x / 109, y: p.y / 109 })));
    redrawCell();
    P.accepted = [];
    showAction(TEXTS.practice.write);
    return;
  }
  animateStroke(i, SETTLE.ink, 22, () => {
    // 描いた画は accepted 相当として残す
    P.accepted.push(P.anim[i].map(p => ({ x: p.x / 109, y: p.y / 109 })));
    P.timers.push(setTimeout(() => animateAll(i + 1), 160));
  });
}

function setMsg(text, cls) {
  const el = $('pMsg');
  el.textContent = text || '';
  el.className = cls || '';
}

function setDots() {
  const n = P.rec ? P.rec.strokeCount : 0;
  $('pDots').innerHTML = Array.from({ length: n }, (_, i) =>
    `<span class="${i < P.accepted.length ? 'done' : ''}"></span>`).join('');
}

function showAction(label) {
  const b = $('pAction');
  b.hidden = false;
  b.textContent = label;
}
function hideAction() { $('pAction').hidden = true; }

function setReadings(rec) {
  const r = formatReadings(rec.readings);
  $('pReadings').innerHTML =
    `<div class="kun">${r.kun.join('　') || ''}</div><div class="on">${r.on.join('　') || ''}</div>`;
}

function clearSettleFx() {
  if (P.settledFx) { P.settledFx.remove(); P.settledFx = null; }
}

function startChar() {
  clearTimers();
  clearSettleFx();
  const rec = P.chars[P.idx];
  P.rec = rec;
  P.tmpl = templateStrokes(rec, cfg.samplePoints);
  P.tmplPaths = rec.strokes.map(s => new Path2D(s.path));
  P.anim = rec.strokes.map(s => samplePath(s.path, 40));
  P.accepted = []; P.scores = []; P.current = null;
  P.stumbles = 0; P.consecFails = 0; P.rescueGuide = false;
  P.phase = 'watch'; P.drawing = false;
  $('pCounter').textContent = TEXTS.practice.counter(P.idx + 1, P.chars.length);
  setReadings(rec);
  setMsg(TEXTS.practice.watchTitle, 'accent');
  setDots();
  hideAction();
  resizeCell();
  P.timers.push(setTimeout(() => animateAll(0), 350));
}

function startTrace() {
  clearTimers();
  P.phase = 'trace';
  P.accepted = []; P.scores = []; P.consecFails = 0;
  setMsg(TEXTS.practice.traceTitle, 'accent');
  setDots(); hideAction(); redrawCell();
}

function startAir() {
  clearTimers();
  clearSettleFx();
  P.phase = 'air';
  P.accepted = []; P.scores = []; P.stumbles = 0; P.consecFails = 0; P.rescueGuide = false;
  setMsg(TEXTS.practice.airTitle, 'accent');
  setDots(); hideAction(); redrawCell();
}

let cameFromTrace = false; // charDone の遷移: なぞり後→そらがき / そらがき後→次の字 or ホーム

async function onCharComplete() {
  cameFromTrace = (P.phase === 'trace');
  if (P.phase === 'trace') {
    P.phase = 'charDone';
    setMsg(TEXTS.practice.good, 'good');
    showAction(TEXTS.practice.next);
    return;
  }
  // そらがき合格 → 定着（署名演出）＋保存（保存はここだけ）
  const avg = Math.round(P.scores.reduce((a, b) => a + b, 0) / P.scores.length);
  P.phase = 'charDone';
  // 定着: 生乾きの canvas 線を消し、同じ座標の SVG が ink に沈む
  P.settledFx = settleOverlay($('pCellWrap'), P.accepted, SETTLE);
  redrawCell();
  const entry = await store.recordPass(P.rec.char, {
    strokes: P.accepted, score: avg, at: Date.now(),
  });
  entries[P.rec.char] = entry;
  // 復習キューから外す（もどってくるの完了）
  const rq = (await store.metaGet('reviewQueue')) || [];
  if (rq.includes(P.rec.char)) {
    await store.metaSet('reviewQueue', rq.filter(c => c !== P.rec.char));
  }
  await P.settledFx.finished;   // 演出が終わってから、静かに文言
  setMsg(TEXTS.practice.finishOne, 'good');
  showAction(P.idx + 1 < P.chars.length ? TEXTS.practice.next : TEXTS.practice.backHome);
  if (P.idx + 1 >= P.chars.length) setMsg(TEXTS.practice.sessionDone, 'good');
}

function onStrokeEnd(points) {
  const i = P.accepted.length;
  const res = scoreStroke(userStrokeTo109(points), P.tmpl[i], cfg);
  const pass = res.score >= cfg.passScore;
  // 3回連続でつまずいた画は、ガイドがある状態なら通す（失敗で終わらせない）
  const rescueAccept = !pass && P.consecFails >= 2 && guideVisible();
  if (pass || rescueAccept) {
    P.accepted.push(points);
    P.scores.push(res.score);
    P.consecFails = 0;
    setMsg('', '');
    setDots();
    redrawCell();
    if (P.accepted.length === P.rec.strokeCount) onCharComplete().catch(console.error);
    return;
  }
  // おしい: 該当画だけアニメで見せて再挑戦
  P.consecFails++;
  P.stumbles++;
  if (P.phase === 'air' && P.stumbles >= 3 && !P.rescueGuide) {
    P.rescueGuide = true;
    setMsg(TEXTS.practice.rescue, 'accent');
  } else {
    setMsg(TEXTS.practice.close(i + 1), 'accent');
  }
  animateStroke(i, TK.inkSoft, 18, () => { P.timers.push(setTimeout(redrawCell, 250)); });
}

// ---- 手書き入力（Phase 0 方式） ----
function toPoint(e) {
  return { x: (e.clientX - rect.left) / cssSize, y: (e.clientY - rect.top) / cssSize };
}

canvas.addEventListener('pointerdown', (e) => {
  if (activePointer !== null) return;
  if (P.phase !== 'trace' && P.phase !== 'air') return;
  if (P.accepted.length >= (P.rec ? P.rec.strokeCount : 0)) return;
  activePointer = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  rect = canvas.getBoundingClientRect();
  clearTimers();          // おしいアニメ中に書き始めたら止める
  redrawCell();
  P.current = [toPoint(e)];
  setSpace();
  ctx.strokeStyle = wetColor(SETTLE);   // 生乾き
  ctx.lineWidth = 2.8;
  drawPoly(P.current, 1);
  e.preventDefault();
});

canvas.addEventListener('pointermove', (e) => {
  if (e.pointerId !== activePointer || !P.current) return;
  const p = toPoint(e);
  const prev = P.current[P.current.length - 1];
  P.current.push(p);
  setSpace();
  ctx.strokeStyle = wetColor(SETTLE);
  ctx.lineWidth = 2.8;
  ctx.beginPath();
  ctx.moveTo(prev.x * 109, prev.y * 109);
  ctx.lineTo(p.x * 109, p.y * 109);
  ctx.stroke();
  e.preventDefault();
});

function endStroke(e) {
  if (e.pointerId !== activePointer) return;
  activePointer = null;
  if (P.current) {
    const pts = P.current;
    P.current = null;
    onStrokeEnd(pts);
  }
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
canvas.addEventListener('contextmenu', e => e.preventDefault());

$('pAction').addEventListener('click', () => {
  if (P.phase === 'watch') startTrace();
  else if (P.phase === 'charDone') advance();
});

function advance() {
  if (cameFromTrace) { cameFromTrace = false; startAir(); return; }
  if (P.idx + 1 < P.chars.length) { P.idx++; startChar(); }
  else goHome();
}

function goHome() {
  clearTimers();
  clearSettleFx();
  P.rec = null;
  refreshHome().then(() => show('scrHome'));
}

$('pQuit').addEventListener('click', goHome);

$('btnToday').addEventListener('click', async () => {
  entries = await store.getAll();
  P.chars = await pickToday();
  P.idx = 0;
  show('scrPractice');
  startChar();
});

window.addEventListener('resize', () => {
  if ($('scrPractice').classList.contains('on')) resizeCell();
});

// ============================================================
// じぶんじてん
// ============================================================

function strokesToPathD(strokes, k) {
  // 正規化(0..1)座標列 → SVG path（109空間）
  return strokes.map(s => {
    if (!s.length) return '';
    let d = `M${(s[0].x * k).toFixed(1)},${(s[0].y * k).toFixed(1)}`;
    if (s.length === 1) d += ` l0.01,0`;
    for (let i = 1; i < s.length; i++) d += ` L${(s[i].x * k).toFixed(1)},${(s[i].y * k).toFixed(1)}`;
    return d;
  });
}

function makeSvg(paths, color, width) {
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', '0 0 109 109');
  for (const d of paths) {
    if (!d) continue;
    const p = document.createElementNS(SVG_NS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', width);
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(p);
  }
  return svg;
}

function sameDay(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear() === db.getFullYear() && da.getMonth() === db.getMonth() && da.getDate() === db.getDate();
}

function renderDict() {
  const n = Object.keys(entries).length;
  $('dCount').textContent = TEXTS.dict.count(n);
  $('dSign').textContent = n ? TEXTS.dict.signature(n) : '';
  const grid = $('dGrid');
  grid.innerHTML = '';
  for (const rec of kanjiList) {
    const e = entries[rec.char];
    const today = e && sameDay(e.latest.at, Date.now());   // 今日ぶん=ふちに新緑の点
    const btn = document.createElement('button');
    btn.className = 'cellBtn' + (e ? ' got' : '') + (today ? ' today' : '');
    const svg = e
      ? settledSvg(e.best.strokes)                              // 定着後の完成形と同一の見た目
      : makeSvg(rec.strokes.map(s => s.path), '#C7CCD4', 4);   // 未習得=ghost の模範(KanjiVG)
    btn.appendChild(svg);
    btn.addEventListener('click', () => openDetail(rec));
    grid.appendChild(btn);
  }
}

let detailTimers = [];
function clearDetailTimers() { for (const t of detailTimers) clearTimeout(t); detailTimers = []; }

function fmtDate(at) {
  const d = new Date(at);
  return `${d.getMonth() + 1}がつ${d.getDate()}にち`;
}

function openDetail(rec) {
  clearDetailTimers();
  const e = entries[rec.char];
  document.querySelector('#dPanel h3').innerHTML = rec.char + ' <small>' + rec.strokeCount + 'かく</small>';
  const three = $('dThree');
  three.innerHTML = '';
  $('dNotYet').hidden = !!e;
  if (!e) {
    $('dNotYet').textContent = TEXTS.dict.notYet;
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.appendChild(makeSvg(rec.strokes.map(s => s.path), '#d5cfc0', 4));
    three.appendChild(slot);
  } else {
    for (const [key, cap] of [['first', TEXTS.dict.first], ['best', TEXTS.dict.best], ['latest', TEXTS.dict.latest]]) {
      const a = e[key];
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.innerHTML = `<div class="cap">${cap}</div><div class="date">${fmtDate(a.at)}</div>`;
      const svg = settledSvg(a.strokes);   // 定着後の完成形と同一の見た目
      slot.appendChild(svg);
      const btn = document.createElement('button');
      btn.textContent = TEXTS.dict.replay;
      btn.addEventListener('click', () => replaySvg(svg));
      slot.appendChild(btn);
      three.appendChild(slot);
    }
  }
  $('dDetail').classList.add('on');
}

// 筆跡の順再生（成長リプレイ最小版）。CSS transition＋setTimeout・rAF非依存
function replaySvg(svg) {
  clearDetailTimers();
  // 定着済みSVGは2層（にじみ＋主線）。リプレイは主線のみ動かし、にじみは伏せて戻す
  const bleed = svg.querySelector('g[data-layer=bleed]');
  const paths = [...svg.querySelectorAll('g[data-layer=main] path')];
  if (!paths.length) paths.push(...svg.querySelectorAll('path'));
  if (bleed) bleed.style.opacity = '0';
  let delay = 120;
  for (const p of paths) {
    const len = p.getTotalLength();
    p.style.transition = 'none';
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
    p.style.visibility = 'hidden';   // round cap の始点ドット対策（★台帳の教訓）
    const dur = Math.min(600, Math.max(200, len * 8));
    detailTimers.push(setTimeout(() => {
      p.style.visibility = 'visible';
      p.getBoundingClientRect();     // 強制リフロー
      p.style.transition = `stroke-dashoffset ${dur}ms ease-in-out`;
      p.style.strokeDashoffset = '0';
    }, delay));
    delay += dur + 140;
  }
  if (bleed) {
    detailTimers.push(setTimeout(() => {
      bleed.style.transition = 'opacity 300ms ease-out';
      bleed.style.opacity = '1';   // 層自体の不透明度（にじみ量は stroke-opacity 側）
    }, delay));
  }
}

const E = { questions: null, answers: [], idx: 0, strokes: [], current: null };
const eCanvas = $('eCell');
const ectx = eCanvas.getContext('2d', { desynchronized: true });
let eCss = 0, eRect = null, ePointer = null;

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function startExam() {
  const saved = await store.metaGet('examProgress');
  if (saved) {
    E.questions = saved.questions;
    E.answers = saved.answers;
    E.idx = saved.idx;
  } else {
    const exam = buildExam({ kanji: kanjiList, sentences: sentencesData, readings: readingsData });
    E.questions = exam.questions;
    E.answers = [];
    E.idx = 0;
  }
  show('scrExam');
  renderExamQ();
}

function renderExamQ() {
  const q = E.questions[E.idx];
  $('eCounter').textContent = TEXTS.exam.counter(E.idx + 1, E.questions.length);
  $('eSentence').innerHTML = '';
  $('eCharBox').hidden = true;
  $('eChoices').innerHTML = '';
  eCanvas.style.display = 'none';
  $('eKakiBtns').style.display = 'none';

  if (q.type === 'yomi') {
    $('ePrompt').textContent = TEXTS.exam.yomiQ;
    $('eSentence').innerHTML =
      esc(q.text.slice(0, q.start))
      + '<span class="target">' + esc(q.text.substr(q.start, q.len)) + '</span>'
      + esc(q.text.slice(q.start + q.len));
    for (let i = 0; i < q.choices.length; i++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = q.choices[i];
      b.addEventListener('click', () => answerExam({ chosenIndex: i }));
      $('eChoices').appendChild(b);
    }
  } else if (q.type === 'kaki') {
    $('ePrompt').textContent = TEXTS.exam.kakiQ;
    $('eSentence').innerHTML =
      esc(q.text.slice(0, q.start))
      + '<span class="kblank">' + esc(q.kana) + '</span>'
      + esc(q.text.slice(q.start + q.len));
    E.strokes = [];
    E.current = null;
    eCanvas.style.display = 'block';
    $('eKakiBtns').style.display = 'flex';
    resizeExamCell();
  } else { // kakusuu
    $('ePrompt').textContent = TEXTS.exam.kakusuuQ;
    const box = $('eCharBox');
    box.hidden = false;
    box.innerHTML = '';
    // 字形はKanjiVG描画（フォント不使用）
    box.appendChild(makeSvg(byCharApp[q.char].strokes.map(s => s.path), '#1a1a1a', 5));
    for (let i = 0; i < q.choices.length; i++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = TEXTS.exam.kakusuuUnit(q.choices[i]);
      b.addEventListener('click', () => answerExam({ chosenIndex: i }));
      $('eChoices').appendChild(b);
    }
  }
}

// 静かに記録して次へ（正誤フィードバックなし・進行を毎問保存）
async function answerExam(ans) {
  E.answers[E.idx] = ans;
  E.idx++;
  if (E.idx >= E.questions.length) {
    await finishExam();
    return;
  }
  await store.metaSet('examProgress', {
    questions: E.questions, answers: E.answers, idx: E.idx,
  });
  renderExamQ();
}

async function finishExam() {
  const res = scoreExam(E.questions, E.answers);
  await store.metaDelete('examProgress');
  const rec = { score: res.score, at: Date.now(), wrong: res.wrong };
  await store.metaSet('examLatest', rec);
  const best = await store.metaGet('examBest');
  if (!best || res.score > best.score) await store.metaSet('examBest', rec);
  // もどってくる: 落とした字を復習キューへ（重複なしで後ろに追加）
  const rq = (await store.metaGet('reviewQueue')) || [];
  await store.metaSet('reviewQueue', [...rq, ...res.wrong.filter(c => !rq.includes(c))]);
  // ふりかえり用: 落とした問題の問と解答（かきは筆跡込み）をメモリに保持
  const byChar = {};
  E.questions.forEach((q, i) => {
    const a = E.answers[i];
    const ok = q.type === 'kaki' ? (a && a.verdict === 'ok') : (a && a.chosenIndex === q.answerIndex);
    if (!ok) byChar[q.char] = { q, a: a || {} };
  });
  showResult(res, { byChar });
}

function showResult(res, detail) {
  $('rScore').textContent = TEXTS.exam.score(res.score);
  const msg = $('rMsg');
  if (res.score >= EXAM_SPEC.fullScore) { msg.textContent = TEXTS.exam.perfect; msg.className = 'good'; }
  else if (res.passed) { msg.textContent = TEXTS.exam.passed; msg.className = 'good'; }
  else { msg.textContent = TEXTS.exam.failed(EXAM_SPEC.passScore - res.score); msg.className = 'accent'; }
  store.metaGet('examBest').then(b => {
    $('rBest').textContent = b ? TEXTS.exam.best(b.score) : '';
  });
  const grid = $('rReviewGrid');
  grid.innerHTML = '';
  if (res.wrong.length) {
    $('rReviewLabel').textContent = TEXTS.exam.reviewList;
    $('rReviewNote').textContent = TEXTS.exam.reviewNote;
    for (const c of res.wrong) {
      const d = document.createElement('div');
      d.className = 'rv';
      d.appendChild(makeSvg(byCharApp[c].strokes.map(s => s.path), '#1a1a1a', 5));
      const info = detail && detail.byChar && detail.byChar[c];
      if (info) {
        const w = document.createElement('div');
        w.className = 'why';
        w.textContent = TEXTS.review.why;
        d.appendChild(w);
        d.addEventListener('click', () => openReview(c, info));
      }
      grid.appendChild(d);
    }
  } else {
    $('rReviewLabel').textContent = TEXTS.exam.noReview;
    $('rReviewNote').textContent = '';
  }
  show('scrResult');
}

// ---- かき問題の手書きマス（ガイドなし・十字のみ）----

function resizeExamCell() {
  const dpr = window.devicePixelRatio || 1;
  eCss = eCanvas.clientWidth;
  eCanvas.width = Math.round(eCss * dpr);
  eCanvas.height = Math.round(eCss * dpr);
  redrawExamCell();
}

function eSpace() {
  const dpr = window.devicePixelRatio || 1;
  const k = (eCss * dpr) / 109;
  ectx.setTransform(k, 0, 0, k, 0, 0);
  ectx.lineCap = 'round';
  ectx.lineJoin = 'round';
}

function redrawExamCell() {
  eSpace();
  ectx.clearRect(0, 0, 109, 109);
  ectx.save();
  ectx.strokeStyle = TK.paperEdge;
  ectx.lineWidth = 0.6;
  ectx.setLineDash([2.4, 1.8]);
  ectx.beginPath();
  ectx.moveTo(54.5, 0); ectx.lineTo(54.5, 109);
  ectx.moveTo(0, 54.5); ectx.lineTo(109, 54.5);
  ectx.stroke();
  ectx.restore();
  ectx.strokeStyle = wetColor(SETTLE);   // 書いている最中の線は常に生乾き
  ectx.lineWidth = 2.8;
  for (const s of E.strokes) drawExamPoly(s);
  if (E.current) drawExamPoly(E.current);
}

function drawExamPoly(points) {
  if (!points.length) return;
  ectx.beginPath();
  ectx.moveTo(points[0].x * 109, points[0].y * 109);
  if (points.length === 1) ectx.lineTo(points[0].x * 109 + 0.01, points[0].y * 109);
  for (let i = 1; i < points.length; i++) ectx.lineTo(points[i].x * 109, points[i].y * 109);
  ectx.stroke();
}

eCanvas.addEventListener('pointerdown', (e) => {
  if (ePointer !== null) return;
  ePointer = e.pointerId;
  eCanvas.setPointerCapture(e.pointerId);
  eRect = eCanvas.getBoundingClientRect();
  E.current = [{ x: (e.clientX - eRect.left) / eCss, y: (e.clientY - eRect.top) / eCss }];
  eSpace();
  ectx.strokeStyle = wetColor(SETTLE);
  ectx.lineWidth = 2.8;
  drawExamPoly(E.current);
  e.preventDefault();
});
eCanvas.addEventListener('pointermove', (e) => {
  if (e.pointerId !== ePointer || !E.current) return;
  const p = { x: (e.clientX - eRect.left) / eCss, y: (e.clientY - eRect.top) / eCss };
  const prev = E.current[E.current.length - 1];
  E.current.push(p);
  eSpace();
  ectx.strokeStyle = wetColor(SETTLE);
  ectx.lineWidth = 2.8;
  ectx.beginPath();
  ectx.moveTo(prev.x * 109, prev.y * 109);
  ectx.lineTo(p.x * 109, p.y * 109);
  ectx.stroke();
  e.preventDefault();
});
function endExamStroke(e) {
  if (e.pointerId !== ePointer) return;
  ePointer = null;
  if (E.current) {
    E.strokes.push(E.current);
    E.current = null;
  }
}
eCanvas.addEventListener('pointerup', endExamStroke);
eCanvas.addEventListener('pointercancel', endExamStroke);
eCanvas.addEventListener('contextmenu', e => e.preventDefault());

$('eRedo').addEventListener('click', () => {
  E.strokes = [];
  E.current = null;
  redrawExamCell();
});
$('eSubmit').addEventListener('click', () => {
  const q = E.questions[E.idx];
  if (!E.strokes.length) return; // 白紙は受け付けない

  answerExam({ verdict, strokes: E.strokes }).catch(console.error);
});

// ============================================================
// ふりかえり（なんでかな？）
// ============================================================
// 設計思想（指示書）: 機械は断定・講釈しない。視覚（重ね表示）が主役。
// 形ずれのみの場合は言葉で指摘しない（誤判定の可能性がある領域）。
// 逃げ道として「もういちど かく」を常に置く。

const W = {
  rec: null, strokes: [], anim: [],
  mode: 'view',           // view | write | done | answer
  writeStrokes: [], current: null, timers: [],
};
const wCanvas = $('wCell');
const wctx = wCanvas.getContext('2d', { desynchronized: true });
let wCss = 0, wRect = null, wPointer = null;

function wClearTimers() { for (const t of W.timers) clearTimeout(t); W.timers = []; }

function wSpace() {
  const dpr = window.devicePixelRatio || 1;
  wCss = wCanvas.clientWidth;
  if (wCanvas.width !== Math.round(wCss * dpr)) {
    wCanvas.width = Math.round(wCss * dpr);
    wCanvas.height = Math.round(wCss * dpr);
  }
  const k = (wCss * dpr) / 109;
  wctx.setTransform(k, 0, 0, k, 0, 0);
  wctx.lineCap = 'round';
  wctx.lineJoin = 'round';
}

function wPoly(points, color, width) {
  if (!points.length) return;
  wctx.strokeStyle = color;
  wctx.lineWidth = width;
  wctx.beginPath();
  wctx.moveTo(points[0].x * 109, points[0].y * 109);
  if (points.length === 1) wctx.lineTo(points[0].x * 109 + 0.01, points[0].y * 109);
  for (let i = 1; i < points.length; i++) wctx.lineTo(points[i].x * 109, points[i].y * 109);
  wctx.stroke();
}

function wCross() {
  wctx.save();
  wctx.strokeStyle = TK.paperEdge;
  wctx.lineWidth = 0.6;
  wctx.setLineDash([2.4, 1.8]);
  wctx.beginPath();
  wctx.moveTo(54.5, 0); wctx.lineTo(54.5, 109);
  wctx.moveTo(0, 54.5); wctx.lineTo(109, 54.5);
  wctx.stroke();
  wctx.restore();
}

// 重ね表示: 手本=あお（ink-soft、問題画は濃く太く）／自分=くろ（ink、問題画以外は薄く）
// 強調は色を増やさず「濃さと太さ」で行う（トークン8色の維持）
function wDrawOverlay(matchResult) {
  wSpace();
  wctx.clearRect(0, 0, 109, 109);
  wCross();
  const failing = matchResult ? matchResult.failing : [];
  W.rec.strokes.forEach((s, i) => {
    wctx.strokeStyle = failing.includes(i) ? TK.inkSoft : TK.ghostFaint;
    wctx.lineWidth = failing.includes(i) ? 4.6 : 3.6;
    wctx.stroke(new Path2D(s.path));
  });
  W.strokes.forEach((s, i) => {
    const bad = matchResult && (failing.includes(i) || i >= W.rec.strokeCount);
    wctx.globalAlpha = bad || !matchResult ? 1 : 0.35;
    wPoly(s, TK.ink, bad ? 3.2 : 2.8);
    wctx.globalAlpha = 1;
  });
}

// 指定した手本画を順にアニメ（タイマー駆動・rAF非依存）
function wAnimate(indices, base) {
  let pos = 0;
  const one = () => {
    if (pos >= indices.length) return;
    const idx = indices[pos];
    const pts = W.anim[idx];
    let k = 2;
    const step = () => {
      wDrawOverlay(W.lastResult);
      wSpace();
      wPoly(pts.slice(0, k).map(p => ({ x: p.x / 109, y: p.y / 109 })), TK.inkSoft, 4.8);
      if (k < pts.length) {
        k += 2;
        W.timers.push(setTimeout(step, 24));
      } else {
        pos++;
        W.timers.push(setTimeout(one, 300));
      }
    };
    step();
  };
  W.timers.push(setTimeout(one, base || 400));
}

function wSetButtons(mode) {
  $('wRewrite').hidden = !(mode === 'view' || mode === 'done');
  $('wRedo').hidden = mode !== 'write';
  $('wSubmit').hidden = mode !== 'write';
}

function viewReview() {
  wClearTimers();
  W.mode = 'view';
  const res = matchKanji(W.strokes, W.rec, cfg);
  W.lastResult = res;
  const title = $('wTitle');
  title.textContent = TEXTS.review.look;
  title.className = '';
  let sub = '';
  let animIdx = [];
  if (res.verdict === 'too-few') {
    sub = TEXTS.review.fewer;
    animIdx = W.rec.strokes.map((_, i) => i);      // 手本の画数アニメ
  } else if (res.verdict === 'too-many') {
    sub = TEXTS.review.more;
    animIdx = W.rec.strokes.map((_, i) => i);
  } else {
    const dirIssues = res.failing.filter(i => res.perStroke[i] && !res.perStroke[i].dirOk);
    if (dirIssues.length) {
      sub = TEXTS.review.order;                     // 向き・順番はアニメで見せる
      animIdx = dirIssues;
    }
    // 形ずれのみ: 言葉での指摘はしない（重ね表示だけ）
  }
  $('wSub').textContent = sub;
  $('wLegend').textContent = TEXTS.review.legend;
  $('wAnswer').textContent = '';
  wCanvas.style.display = 'block';
  wSetButtons('view');
  wDrawOverlay(res);
  if (animIdx.length) wAnimate(animIdx);
}

function openReview(char, info) {
  wClearTimers();
  const { q, a } = info;
  $('wDetail').classList.add('on');
  if (q.type === 'kaki' && a.strokes && a.strokes.length) {
    W.rec = byCharApp[char];
    W.anim = W.rec.strokes.map(s => samplePath(s.path, 40));
    W.strokes = a.strokes;
    viewReview();
    return;
  }
  // よみ・かくすう（またはかき筆跡なし）: こたえを示すだけ。講釈しない
  W.mode = 'answer';
  $('wTitle').textContent = '';
  $('wTitle').className = '';
  $('wLegend').textContent = '';
  wSetButtons('answer');
  if (q.type === 'yomi') {
    $('wSub').textContent = q.text;
    wCanvas.style.display = 'none';
    $('wAnswer').textContent = TEXTS.review.answerIs(q.choices[q.answerIndex]);
  } else {
    $('wSub').textContent = '';
    wCanvas.style.display = 'block';
    W.rec = byCharApp[char];
    wSpace();
    wctx.clearRect(0, 0, 109, 109);
    wCross();
    for (const s of W.rec.strokes) {
      wctx.strokeStyle = TK.ink;
      wctx.lineWidth = 3.6;
      wctx.stroke(new Path2D(s.path));
    }
    $('wAnswer').textContent = q.type === 'kakusuu'
      ? TEXTS.review.answerIs(TEXTS.exam.kakusuuUnit(q.strokeCount))
      : '';
  }
}

// もういちど かく（納得のための再挑戦。テストの点は変えない）
$('wRewrite').addEventListener('click', () => {
  wClearTimers();
  W.mode = 'write';

});

$('wRedo').addEventListener('click', () => {

  wSpace();
  wctx.clearRect(0, 0, 109, 109);

});

$('wSubmit').addEventListener('click', () => {
  if (!W.writeStrokes.length) return;
  const res = matchKanji(W.writeStrokes, W.rec, cfg);
  if (res.verdict === 'ok') {
    wClearTimers();

    $('wTitle').textContent = TEXTS.review.done;
    $('wTitle').className = 'good';
    $('wSub').textContent = '';
    wSetButtons('done');
    // 書けた字をそのまま見せる（強調なし・ink で静かに）
    wSpace();
    wctx.clearRect(0, 0, 109, 109);
    wCross();
    for (const s of W.writeStrokes) wPoly(s, TK.ink, 2.8);
  } else {
    // 中立にもう一度重ねて見せる（新しい筆跡で比較し直す）
    W.strokes = W.writeStrokes;
    viewReview();
  }
});

$('wClose').addEventListener('click', () => {
  wClearTimers();
  $('wDetail').classList.remove('on');
});
$('wDetail').addEventListener('click', (e) => {
  if (e.target === $('wDetail')) { wClearTimers(); $('wDetail').classList.remove('on'); }
});

// 手書き入力（書き直し用）
wCanvas.addEventListener('pointerdown', (e) => {
  if (W.mode !== 'write' || wPointer !== null) return;
  wPointer = e.pointerId;
  wCanvas.setPointerCapture(e.pointerId);
  wRect = wCanvas.getBoundingClientRect();
  W.current = [{ x: (e.clientX - wRect.left) / wCss, y: (e.clientY - wRect.top) / wCss }];
  wSpace();
  wPoly(W.current, wetColor(SETTLE), 2.8);   // 書き直し中も生乾き
  e.preventDefault();
});
wCanvas.addEventListener('pointermove', (e) => {
  if (e.pointerId !== wPointer || !W.current) return;
  const p = { x: (e.clientX - wRect.left) / wCss, y: (e.clientY - wRect.top) / wCss };
  const prev = W.current[W.current.length - 1];
  W.current.push(p);
  wSpace();
  wctx.strokeStyle = wetColor(SETTLE);
  wctx.lineWidth = 2.8;
  wctx.beginPath();
  wctx.moveTo(prev.x * 109, prev.y * 109);
  wctx.lineTo(p.x * 109, p.y * 109);
  wctx.stroke();
  e.preventDefault();
});
function wEndStroke(e) {
  if (e.pointerId !== wPointer) return;
  wPointer = null;
  if (W.current) {
    W.writeStrokes.push(W.current);
    W.current = null;
  }
}
wCanvas.addEventListener('pointerup', wEndStroke);
wCanvas.addEventListener('pointercancel', wEndStroke);
wCanvas.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// バックアップ（ほごしゃ向け・設定隅）
// ============================================================

$('btnExport').addEventListener('click', async () => {
  const obj = await store.exportJson(Date.now());
  if (!Object.keys(obj.entries).length) { alert(TEXTS.backup.empty); return; }
  const blob = new Blob([JSON.stringify(obj)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jibun-jiten-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

$('btnImport').addEventListener('click', () => $('fileImport').click());
$('fileImport').addEventListener('change', async (ev) => {
  const file = ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  if (!confirm(TEXTS.backup.importConfirm)) return;
  try {
    const obj = JSON.parse(await file.text());
    const n = await store.importJson(obj);
    await refreshHome();
    alert(TEXTS.backup.importDone(n));
  } catch (err) {
    alert(TEXTS.backup.importError + (err.message || err));
  }
});

// ============================================================
// 起動
// ============================================================

(async () => {
  applyTexts();
  store = await openStore();
  settings = await loadSettings(store);   // 学年設定（未設定なら grade=null）
  const [kd, sd, rd] = await Promise.all([
    fetch('data/kanji-g1.json').then(r => r.json()),
    fetch('data/sentences-g1.json').then(r => r.json()),
    fetch('data/exam-readings-g1.json').then(r => r.json()),
  ]);
  kanjiList = kd.kanji;
  byCharApp = Object.fromEntries(kanjiList.map(k => [k.char, k]));
  sentencesData = sd.sentences;
  readingsData = rd.readings;
  await refreshHome();
  // 初回だけ学年をえらぶ（保存済みならそのままホーム）
  if (settings.grade == null) {
    renderGradeSelect();
    show('scrGradeSelect');
  }

  // 開発用: 結果画面の文言確認（本番導線からは見えない）
  // 例: index.html?dev-result=115&dev-wrong=右左山
  const qp = new URLSearchParams(location.search);
  if (qp.has('dev-result')) {
    const score = Math.max(0, Math.min(150, parseInt(qp.get('dev-result'), 10) || 0));
    const wrong = [...(qp.get('dev-wrong') || '')].filter(c => byCharApp[c]);
    showResult({ score, wrong, passed: score >= EXAM_SPEC.passScore }); // 表示のみ・保存しない
  }
  // 開発用: ふりかえりの誤りパターン再現（表示のみ・保存しない）
  // 例: index.html?dev-review=jun（筆順違い）/ kazu（画数不足）/ katachi（形ずれ）
  if (qp.has('dev-review')) {
    const kind = qp.get('dev-review');
    const char = qp.get('dev-char') && byCharApp[qp.get('dev-char')] ? qp.get('dev-char') : '右';
    const rec = byCharApp[char];
    let strokes = templateStrokes(rec, 24).map(pts => pts.map(p => ({ x: p.x / 109, y: p.y / 109 })));
    if (kind === 'jun' && strokes.length >= 2) {
      [strokes[0], strokes[1]] = [strokes[1], strokes[0]];
    } else if (kind === 'kazu') {
      strokes = strokes.slice(0, -1);
    } else if (kind === 'katachi') {
      strokes = strokes.map(s => s.map(p => ({
        x: Math.min(1, p.x + 0.12), y: Math.min(1, p.y + 0.12) })));
    }
    showResult({ score: 145, wrong: [char], passed: true },
      { byChar: { [char]: { q: { type: 'kaki', char }, a: { strokes } } } });
    openReview(char, { q: { type: 'kaki', char }, a: { strokes } });
  }
})();
</script>
